services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: klacks-postgres
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    environment:
      POSTGRES_DB: Klacks
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d Klacks"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: klacks-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@klacks.app}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    expose:
      - "80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  klacks-api:
    build:
      context: .
      dockerfile: ./Klacks.Api/Dockerfile
    container_name: klacks-api
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=Klacks;Username=admin;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - ServerIp=${SERVER_IP:-157.180.42.127}
      - JwtSettings__Secret=${JWT_SECRET:?JWT_SECRET must be set}
      - JwtSettings__ValidAudience=https://${DOMAIN:-klacks.site}
      - JwtSettings__ValidIssuer=https://${DOMAIN:-klacks.site}:5443
      - PasswordReset__BaseUrl=https://${DOMAIN:-klacks.site}:7443
      - Cors__Host=https://${DOMAIN:-klacks.site}
      - Cors__Home=https://${DOMAIN:-klacks.site}
    volumes:
      - api-uploads:/app/Images
      - api-documents:/app/Documents
      - api-dataprotection:/app/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'

  # Out-of-process auto-update executor. Must outlive klacks-api (it recreates that container), so it
  # runs separately with the Docker socket + compose project dir mounted. Reads/writes the shared
  # update_history table. Phase 0.3 switches build: -> image: ghcr.io/heribertg/klacks-updater.
  klacks-updater:
    # Inert until the deployment wiring is complete (Klacks.Updater repo cloned to /root/apps + ghcr
    # pull auth). The profile keeps it out of the default `docker compose up` so the unfinished
    # sidecar never breaks the production stack. Enable later with: docker compose --profile updater up -d
    profiles: ["updater"]
    build:
      context: .
      dockerfile: ./Klacks.Updater/Dockerfile
    container_name: klacks-updater
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Updater__ConnectionString=Host=postgres;Database=Klacks;Username=admin;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - Updater__HealthUrl=http://klacks-api:5000/internal/health/deep
      - Updater__ComposeProjectDir=/apps
      - Updater__ApiImageRepository=ghcr.io/heribertg/klacks-api
      - Updater__ApiServiceName=klacks-api
      - Updater__ApiTagEnvVar=KLACKS_API_TAG
      - Updater__PostgresContainer=klacks-postgres
      - Updater__SignaturePublicKey=${UPDATE_SIGNATURE_PUBLIC_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/apps:/apps
      - api-update-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - klacks_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  klacks-ui:
    build: ./Klacks.Ui
    container_name: klacks-ui
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - klacks-api
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  klacks-blazor:
    build: ./Klacks.Blazor
    container_name: klacks-blazor
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      - klacks-api
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  klacks-marketing:
    build: ./Klacks.Marketing
    container_name: klacks-marketing
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  klacks-marketplace:
    build: ./Klacks.Marketplace
    container_name: klacks-marketplace
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    volumes:
      - marketplace_data:/app/data
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  devknowledge-postgres:
    image: pgvector/pgvector:pg16
    container_name: devknowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devknowledge
      POSTGRES_USER: devknowledge
      POSTGRES_PASSWORD: ${DEVKNOWLEDGE_DB_PASSWORD:?DEVKNOWLEDGE_DB_PASSWORD must be set}
    expose:
      - "5432"
    volumes:
      - devknowledge_postgres_data:/var/lib/postgresql/data
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devknowledge -d devknowledge"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  devknowledge-api:
    build:
      context: ./DevKnowledge
      dockerfile: backend/DevKnowledge.API/Dockerfile
    container_name: devknowledge-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=devknowledge-postgres;Database=devknowledge;Username=devknowledge;Password=${DEVKNOWLEDGE_DB_PASSWORD:?DEVKNOWLEDGE_DB_PASSWORD must be set}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - KnowledgeBase__SourcePath=/data/knowledge
    volumes:
      - devknowledge_data:/data/knowledge
    depends_on:
      - devknowledge-postgres
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  devknowledge-ui:
    build:
      context: ./DevKnowledge
      dockerfile: frontend/Dockerfile
    container_name: devknowledge-ui
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - devknowledge-api
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # Renews the Let's Encrypt certificate every 12h. Renewal only runs when
  # the cert is within 30 days of expiry; otherwise certbot exits as a no-op.
  # After a successful renewal, sends SIGHUP to klacks-proxy via the Docker
  # Engine API (mounted socket) so nginx picks up the new cert without restart.
  certbot-renew:
    image: certbot/certbot
    container_name: klacks-certbot-renew
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl >/dev/null 2>&1 || true
        trap exit TERM
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet \
            --deploy-hook 'curl -sS --unix-socket /var/run/docker.sock -X POST http://localhost/containers/klacks-proxy/kill?signal=HUP'
          sleep 12h & wait $${!}
        done
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

  nginx-proxy:
    image: nginx:alpine
    container_name: klacks-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
      - "5000:5000"
      - "5443:5443"
      - "7443:7443"
      - "5553:5553"
      - "7553:7553"
      - "7643:7643"
      - "8443:8443"
    environment:
      - SERVER_IP=${SERVER_IP:-157.180.42.127}
    command: /bin/sh -c "envsubst '$$SERVER_IP' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    volumes:
      - ./Klacks.Api/deploy/nginx-proxy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./Klacks.Api/deploy/nginx-proxy/certs:/etc/nginx/certs:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - klacks-api
      - klacks-ui
      - klacks-blazor
      - klacks-marketing
      - pgadmin
      - devknowledge-ui
    networks:
      - klacks_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

networks:
  klacks_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  marketplace_data:
    driver: local
  devknowledge_postgres_data:
    driver: local
  devknowledge_data:
    driver: local
  api-uploads:
    driver: local
  api-documents:
    driver: local
  api-dataprotection:
    driver: local
  api-update-backups:
    driver: local
  letsencrypt:
    driver: local
  certbot-webroot:
    driver: local
