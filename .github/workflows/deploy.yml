# .github/workflows/deploy.yml for Klacks.Api
name: Test & Deploy Klacks.Api to Hetzner

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - '**'
      - '!README.md'
      - '!docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-klacks-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Klacks.Api
      uses: actions/checkout@v4
      with:
        path: Klacks.Api

    - name: Checkout Klacks.Plugin.Contracts
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Plugin.Contracts
        path: Klacks.Plugin.Contracts
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Plugin.Messaging
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Plugin.Messaging
        path: Klacks.Plugin.Messaging
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Docs
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Docs
        path: Klacks.Docs
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Api.SourceGenerators
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Api.SourceGenerators
        path: Klacks.Api.SourceGenerators
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.UnitTest
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.UnitTest
        path: Klacks.UnitTest
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.ScheduleOptimizer
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.ScheduleOptimizer
        path: Klacks.ScheduleOptimizer

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Klacks.UnitTest/Klacks.UnitTest.csproj

    - name: Build
      run: dotnet build Klacks.UnitTest/Klacks.UnitTest.csproj --no-restore

    - name: Run unit tests
      run: dotnet test Klacks.UnitTest/Klacks.UnitTest.csproj --no-build --verbosity normal

  # Integration tests require a fully migrated + seeded database.
  # They run locally against the dev DB (port 5434), not in CI.

  # Phase 0.3: build + push the release image to ghcr.io on a v* tag (parallel to the legacy
  # build-on-server deploy below, which still runs on main). The auto-update manifest points at
  # these release tags; the out-of-process updater pulls them.
  build-and-push:
    needs: [unit-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - name: Checkout Klacks.Api
      uses: actions/checkout@v4
      with:
        path: Klacks.Api

    - name: Checkout Klacks.Plugin.Contracts
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Plugin.Contracts
        path: Klacks.Plugin.Contracts
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Plugin.Messaging
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Plugin.Messaging
        path: Klacks.Plugin.Messaging
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Docs
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Docs
        path: Klacks.Docs
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.Api.SourceGenerators
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.Api.SourceGenerators
        path: Klacks.Api.SourceGenerators
        token: ${{ secrets.GH_PAT || github.token }}

    - name: Checkout Klacks.ScheduleOptimizer
      uses: actions/checkout@v4
      with:
        repository: HeribertG/Klacks.ScheduleOptimizer
        path: Klacks.ScheduleOptimizer

    - name: Extract version from tag
      id: version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        # The embedded VersionConstant.CPatch is a const int, so strip any prerelease
        # suffix (1.0.2-rc1 -> patch 2). The prerelease identity lives only in the image tag.
        PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
        echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
        echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
        # Prerelease tags (a hyphen in the version, e.g. 1.0.2-rc1) publish only the
        # exact immutable tag. They must never move the floating :latest / :MAJOR /
        # :MAJOR.MINOR tags that production and the auto-update manifest resolve.
        {
          echo "tags<<EOF"
          echo "ghcr.io/heribertg/klacks-api:$VERSION"
          if [ "${VERSION#*-}" = "$VERSION" ]; then
            echo "ghcr.io/heribertg/klacks-api:$MAJOR.$MINOR"
            echo "ghcr.io/heribertg/klacks-api:$MAJOR"
            echo "ghcr.io/heribertg/klacks-api:latest"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Klacks.Api image (linux/arm64)
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Klacks.Api/Dockerfile
        # Multi-arch: arm64 for Hetzner (Ampere), amd64 for on-prem customers (Docker Desktop).
        # steps.build.outputs.digest becomes the multi-arch index digest — fine for the trust model
        # (the updater pulls by tag and verifies the RSA signature against the payload, not by digest).
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.version.outputs.tags }}
        build-args: |
          KLACKS_VERSION_MAJOR=${{ steps.version.outputs.major }}
          KLACKS_VERSION_MINOR=${{ steps.version.outputs.minor }}
          KLACKS_VERSION_PATCH=${{ steps.version.outputs.patch }}
          KLACKS_BUILD_KEY=${{ github.sha }}
          KLACKS_VARIANT=RELEASE

    # Stable releases only: build the signed update manifest and publish it as a GitHub Release
    # asset. The out-of-process updater verifies the RSA-SHA256 signature over the canonical
    # "{version}\n{apiImage}\n{digest}" payload; the API detection service reads the manifest from
    # the release's latest/download URL. Prereleases build the image but publish no manifest.
    - name: Sign and publish update manifest
      if: ${{ !contains(github.ref, '-') }}
      env:
        PRIV_B64: ${{ secrets.UPDATE_SIGNATURE_PRIVATE_KEY_B64 }}
        VERSION: ${{ steps.version.outputs.version }}
        DIGEST: ${{ steps.build.outputs.digest }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ -z "${PRIV_B64:-}" ]; then
          echo "::error::UPDATE_SIGNATURE_PRIVATE_KEY_B64 secret is not set"; exit 1
        fi
        API_IMAGE="ghcr.io/heribertg/klacks-api:${VERSION}"
        UI_IMAGE="ghcr.io/heribertg/klacks-ui:${VERSION}"
        echo "$PRIV_B64" | base64 -d > /tmp/update_priv.pem
        # Canonical signed payload — must byte-match Klacks.Updater ArtifactSignaturePayload.Build.
        SIG=$(printf '%s\n%s\n%s' "$VERSION" "$API_IMAGE" "$DIGEST" \
          | openssl dgst -sha256 -sign /tmp/update_priv.pem | base64 -w0)
        rm -f /tmp/update_priv.pem
        cat > stable.json <<EOF
        {
          "channel": "Stable",
          "latestVersion": "${VERSION}",
          "minUpgradableFrom": "1.0.0",
          "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "containsMigrations": true,
          "artifacts": {
            "docker": { "apiImage": "${API_IMAGE}", "uiImage": "${UI_IMAGE}", "sha256": "${DIGEST}" }
          },
          "signature": "${SIG}"
        }
        EOF
        echo "Manifest stable.json:"; cat stable.json
        gh release create "v${VERSION}" --repo "$GITHUB_REPOSITORY" --title "v${VERSION}" \
          --notes "Automated release ${VERSION}" --latest 2>/dev/null || true
        gh release upload "v${VERSION}" stable.json --repo "$GITHUB_REPOSITORY" --clobber

    # Stable releases only: bundle the on-prem Docker installer (deploy/onprem) as a release asset so
    # customers fetch it from releases/latest/download/klacks-onprem.zip. The vendor signature public
    # key (derived from the signing private key) is injected so the installer can verify auto-updates.
    - name: Bundle on-prem installer
      if: ${{ !contains(github.ref, '-') }}
      env:
        PRIV_B64: ${{ secrets.UPDATE_SIGNATURE_PRIVATE_KEY_B64 }}
        VERSION: ${{ steps.version.outputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ONPREM=Klacks.Api/deploy/onprem
        echo "$PRIV_B64" | base64 -d > /tmp/update_priv.pem
        openssl rsa -in /tmp/update_priv.pem -pubout > "$ONPREM/update-public-key.pem"
        rm -f /tmp/update_priv.pem
        ( cd Klacks.Api/deploy && zip -r /tmp/klacks-onprem.zip onprem )
        gh release upload "v${VERSION}" /tmp/klacks-onprem.zip --repo "$GITHUB_REPOSITORY" --clobber

  deploy:
    needs: [unit-tests, build-and-push]
    # Stable release tags only. Prerelease tags (v1.0.3-rc1) still build the image via
    # build-and-push for throwaway validation, but must never deploy to production.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Resolve release version
      id: rel
      run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.2.2
      env:
        KLACKS_API_TAG: ${{ steps.rel.outputs.tag }}
        KLACKS_UI_TAG: ${{ steps.rel.outputs.tag }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        command_timeout: 30m
        envs: KLACKS_API_TAG,KLACKS_UI_TAG
        script: |
          set -e
          echo "🚀 Deploying Klacks.Api..."

          # Serialize deploys via flock so a fresh push cannot start a second
          # build on top of one that's still running from a previously-cancelled
          # run (buildkit subprocesses keep going after the SSH session dies).
          # The lock auto-releases when this shell exits.
          LOCKFILE=/var/lock/klacks-api-deploy.lock
          exec 200>"$LOCKFILE"
          echo "⏳ Acquiring deploy lock..."
          if ! flock -w 1200 200; then
            echo "❌ Could not acquire deploy lock within 20 minutes — another deploy is stuck"
            exit 1
          fi
          echo "✅ Got deploy lock"

          # Belt-and-braces: kill any orphan build processes from runs that
          # were cancelled mid-build. We can't use pkill -f because
          # drone-ssh invokes this whole script as `bash -c "<script>"` and
          # the script text itself contains the pattern — pkill -f would
          # SIGKILL the parent shell. Instead, match by process basename
          # via pgrep -x and check /proc/PID/cmdline.
          echo "🧹 Cleaning up orphan build processes from cancelled runs..."
          for pid in $(pgrep -x dotnet 2>/dev/null); do
            cmdline=$(tr '\0' ' ' < /proc/$pid/cmdline 2>/dev/null)
            case "$cmdline" in
              *"publish Klacks.Api/Klacks.Api.csproj"*)
                echo "  Killing orphan dotnet PID $pid"
                kill -9 "$pid" 2>/dev/null || true
                ;;
            esac
          done
          sleep 2

          # Navigate to correct directory
          cd /root/apps

          # Update Klacks.Api Repository
          if [ -d "Klacks.Api" ]; then
            echo "📦 Updating Klacks.Api..."
            cd Klacks.Api
            # Get current branch name
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            echo "Current branch: $CURRENT_BRANCH"
            # Force pull
            git fetch origin
            git reset --hard origin/$CURRENT_BRANCH
            cd ..
          else
            echo "📦 Cloning Klacks.Api..."
            git clone https://github.com/HeribertG/Klacks.Api.git
          fi

          # Klacks.Ui runs image-mode (pulled below); no source checkout/build needed here.

          # Update Plugin projects (required by Klacks.Api) + the auto-update sidecar repo (public)
          for PLUGIN_REPO in Klacks.Plugin.Contracts Klacks.Plugin.Messaging Klacks.Docs Klacks.Api.SourceGenerators Klacks.ScheduleOptimizer Klacks.Updater; do
            EXPECTED_URL="https://github.com/HeribertG/$PLUGIN_REPO.git"
            NEEDS_CLONE=false

            if [ -d "$PLUGIN_REPO" ]; then
              ACTUAL_URL=$(cd $PLUGIN_REPO && git remote get-url origin 2>/dev/null || echo "")
              if [ "$ACTUAL_URL" != "$EXPECTED_URL" ]; then
                echo "⚠️  $PLUGIN_REPO has wrong remote ($ACTUAL_URL), re-cloning..."
                rm -rf "$PLUGIN_REPO"
                NEEDS_CLONE=true
              else
                echo "📦 Updating $PLUGIN_REPO..."
                cd $PLUGIN_REPO
                git fetch origin
                DEFAULT_BRANCH=$(git remote show origin 2>/dev/null | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
                git checkout "$DEFAULT_BRANCH" 2>/dev/null || true
                git reset --hard "origin/$DEFAULT_BRANCH"
                cd ..
              fi
            else
              NEEDS_CLONE=true
            fi

            if [ "$NEEDS_CLONE" = true ]; then
              echo "📦 Cloning $PLUGIN_REPO..."
              git clone "$EXPECTED_URL"
            fi
          done

          # Sync docker-compose from repo to server root
          cp Klacks.Api/deploy/docker-compose-server.yml docker-compose.yml

          # Check Docker Compose version
          if command -v docker-compose &> /dev/null; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi
          echo "Using: $COMPOSE_CMD"

          # Klacks.Api runs image-mode: pull the release image that build-and-push pushed to ghcr
          # for this tag. Persist the tag in .env so a plain `compose up` (server reboot, or the
          # out-of-process updater's rollback) resolves the same version without this workflow.
          export KLACKS_API_TAG="${KLACKS_API_TAG}"
          sed -i '/^KLACKS_API_TAG=/d' .env 2>/dev/null || true
          echo "KLACKS_API_TAG=${KLACKS_API_TAG}" >> .env
          echo "📥 Pulling klacks-api image ${KLACKS_API_TAG}..."
          $COMPOSE_CMD pull klacks-api

          # Klacks.Ui runs image-mode: pull the release image (built in parallel by the Klacks.Ui
          # workflow for this same tag). The UI image may still be building when this deploy starts,
          # so retry the pull with backoff. Persist the tag in .env like the API tag so a plain
          # `compose up` (reboot / updater rollback) resolves the same version.
          export KLACKS_UI_TAG="${KLACKS_UI_TAG}"
          sed -i '/^KLACKS_UI_TAG=/d' .env 2>/dev/null || true
          echo "KLACKS_UI_TAG=${KLACKS_UI_TAG}" >> .env
          echo "📥 Pulling klacks-ui image ${KLACKS_UI_TAG} (waiting for parallel UI build)..."
          UI_PULLED=false
          for attempt in $(seq 1 15); do
            if $COMPOSE_CMD pull klacks-ui; then
              UI_PULLED=true
              break
            fi
            echo "⏳ klacks-ui:${KLACKS_UI_TAG} not available yet (attempt $attempt/15), retrying in 60s..."
            sleep 60
          done
          if [ "$UI_PULLED" != true ]; then
            echo "❌ klacks-ui image ${KLACKS_UI_TAG} did not become available — aborting (UI would be stale)"
            exit 1
          fi
          echo "🔄 Restarting Klacks.Ui..."
          docker stop klacks-ui 2>/dev/null || true
          docker rm klacks-ui 2>/dev/null || true
          $COMPOSE_CMD up -d klacks-ui

          echo "🔄 Restarting Klacks.Api + Nginx Proxy..."
          docker stop klacks-api 2>/dev/null || true
          docker rm klacks-api 2>/dev/null || true
          $COMPOSE_CMD up -d klacks-api
          $COMPOSE_CMD restart nginx-proxy 2>/dev/null || $COMPOSE_CMD up -d nginx-proxy

          # Auto-update sidecar (out-of-process executor). Non-fatal: a build/start hiccup must never
          # fail the main deploy — api/ui keep running. Idles safely when there are no pending rows.
          echo "🔄 (Re)building + starting klacks-updater sidecar (profile: updater)..."
          $COMPOSE_CMD --profile updater build klacks-updater 2>&1 | tail -3 || echo "⚠️  updater build failed (non-fatal)"
          docker stop klacks-updater 2>/dev/null || true
          docker rm klacks-updater 2>/dev/null || true
          $COMPOSE_CMD --profile updater up -d klacks-updater 2>&1 | tail -3 || echo "⚠️  updater start failed (non-fatal)"

          # Free disk space: remove dangling images (previous build's <none>-tagged
          # layers) and unused BuildKit cache. Each --no-cache build above leaves
          # ~500MB-1GB behind; without pruning, the Hetzner disk fills within ~30 deploys.
          echo "🧹 Pruning old Docker layers..."
          docker image prune -f 2>&1 | tail -1
          docker builder prune -f 2>&1 | tail -1
          df -h / | tail -1

          echo "✅ Deployment completed!"

          # Status check
          echo "📊 Service status:"
          $COMPOSE_CMD ps klacks-api

          # Health Check
          sleep 15
          echo "🏥 Health Check for Klacks.Api..."

          # Check if service is running
          if $COMPOSE_CMD ps klacks-api | grep -q "Up"; then
            echo "✅ Container is running"
          else
            echo "❌ Container is not running"
            $COMPOSE_CMD logs klacks-api --tail=20
            exit 1
          fi

          # Check HTTP response via Nginx proxy
          if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/values 2>/dev/null | grep -qE "200|401|404"; then
            echo "✅ Klacks.Api is responding via Nginx (port 5000)"
          elif curl -f -s -o /dev/null -w "%{http_code}" http://localhost:5000/swagger 2>/dev/null | grep -qE "200|301|302"; then
            echo "✅ Klacks.Api Swagger is accessible via Nginx"
          else
            echo "⚠️  API endpoints not yet accessible via Nginx (might still be initializing)"
          fi

          # Check database connectivity via container logs
          echo "🔍 Checking for database connection errors..."
          if $COMPOSE_CMD logs klacks-api --tail=50 | grep -i "error\|exception" | grep -i "database\|postgres"; then
            echo "❌ Database connection errors found!"
            $COMPOSE_CMD logs klacks-api --tail=30
            exit 1
          else
            echo "✅ No database connection errors detected"
          fi

          # Check native library availability
          echo "🔍 Checking native library check..."
          if $COMPOSE_CMD logs klacks-api --tail=50 | grep -q "Native library check passed"; then
            echo "✅ Native libraries verified (LDAP)"
          elif $COMPOSE_CMD logs klacks-api --tail=50 | grep -q "FATAL: Required native libraries missing"; then
            echo "❌ Native libraries missing — LDAP authentication will not work!"
            $COMPOSE_CMD logs klacks-api --tail=30
            exit 1
          else
            echo "⚠️  Native library check not found in logs (still initializing?)"
          fi

          # Check Klacks.Ui (always recreated in image-mode)
          if $COMPOSE_CMD ps klacks-ui | grep -q "Up"; then
            echo "✅ Klacks.Ui container is running"
          else
            echo "❌ Klacks.Ui container is not running"
            $COMPOSE_CMD logs klacks-ui --tail=20
          fi

          # Auth smoke test — verify login actually works
          echo "🔍 Auth smoke test..."
          sleep 10
          AUTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://klacks-api:5000/api/backend/account/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-test@invalid","password":"invalid"}' 2>/dev/null || echo "000")
          if [ "$AUTH_RESPONSE" = "401" ]; then
            echo "✅ Auth endpoint responding correctly (401 for invalid credentials)"
          elif [ "$AUTH_RESPONSE" = "000" ]; then
            echo "⚠️  Auth endpoint not reachable yet (API still starting)"
          else
            echo "⚠️  Auth endpoint returned unexpected status: $AUTH_RESPONSE"
          fi
