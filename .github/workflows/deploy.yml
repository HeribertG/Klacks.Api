# .github/workflows/deploy.yml für Klacks.Api
name: Deploy Klacks.Api to Hetzner

on:
  push:
    branches: [ main ]
    paths:
      - '**'
      - '!README.md'
      - '!docs/**'

concurrency:
  group: deploy-klacks-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          set -e
          echo "🚀 Deploying Klacks.Api..."
          
          # Navigate to correct directory
          cd /root/apps
          
          # Update Klacks.Api Repository
          if [ -d "Klacks.Api" ]; then
            echo "📦 Updating Klacks.Api..."
            cd Klacks.Api
            # Get current branch name
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            echo "Current branch: $CURRENT_BRANCH"
            # Force pull - überschreibt lokale Änderungen
            git fetch origin
            git reset --hard origin/$CURRENT_BRANCH
            cd ..
          else
            echo "📦 Cloning Klacks.Api..."
            git clone https://github.com/HeribertG/Klacks.Api.git
          fi
          
          # Update Plugin projects (required by Klacks.Api)
          for PLUGIN_REPO in Klacks.Plugin.Contracts Klacks.Plugin.Messaging; do
            if [ -d "$PLUGIN_REPO" ]; then
              echo "📦 Updating $PLUGIN_REPO..."
              cd $PLUGIN_REPO
              git fetch origin
              git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
              cd ..
            else
              echo "📦 Cloning $PLUGIN_REPO..."
              git clone https://github.com/HeribertG/$PLUGIN_REPO.git
            fi
          done

          # Sync docker-compose from repo to server root
          cp Klacks.Api/deploy/docker-compose-server.yml docker-compose.yml

          # Check Docker Compose version
          if command -v docker-compose &> /dev/null; then
            COMPOSE_CMD="docker-compose"
          else
            COMPOSE_CMD="docker compose"
          fi
          echo "Using: $COMPOSE_CMD"
          
          # Rebuild and restart only API service with version injection
          echo "🔨 Building Klacks.Api..."
          $COMPOSE_CMD build klacks-api --no-cache \
            --build-arg KLACKS_VERSION_MAJOR=${VERSION_MAJOR:-1} \
            --build-arg KLACKS_VERSION_MINOR=${VERSION_MINOR:-0} \
            --build-arg KLACKS_VERSION_PATCH=${VERSION_PATCH:-0} \
            --build-arg KLACKS_BUILD_KEY=$(git rev-parse --short HEAD) \
            --build-arg KLACKS_BUILD_TIMESTAMP=$(date -u +%Y-%m-%d) \
            --build-arg KLACKS_VARIANT=RELEASE
          
          echo "🔄 Restarting Klacks.Api + Nginx Proxy..."
          $COMPOSE_CMD up -d klacks-api
          $COMPOSE_CMD restart nginx-proxy 2>/dev/null || $COMPOSE_CMD up -d nginx-proxy

          echo "✅ Klacks.Api deployment completed!"
          
          # Status check
          echo "📊 Service status:"
          $COMPOSE_CMD ps klacks-api
          
          # Health Check
          sleep 15
          echo "🏥 Health Check for Klacks.Api..."
          
          # Check if service is running
          if $COMPOSE_CMD ps klacks-api | grep -q "Up"; then
            echo "✅ Container is running"
          else
            echo "❌ Container is not running"
            $COMPOSE_CMD logs klacks-api --tail=20
            exit 1
          fi
          
          # Check HTTP response via Nginx proxy
          if curl -f -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/values 2>/dev/null | grep -qE "200|401|404"; then
            echo "✅ Klacks.Api is responding via Nginx (port 5000)"
          elif curl -f -s -o /dev/null -w "%{http_code}" http://localhost:5000/swagger 2>/dev/null | grep -qE "200|301|302"; then
            echo "✅ Klacks.Api Swagger is accessible via Nginx"
          else
            echo "⚠️  API endpoints not yet accessible via Nginx (might still be initializing)"
          fi
          
          # Check database connectivity via container logs
          echo "🔍 Checking for database connection errors..."
          if $COMPOSE_CMD logs klacks-api --tail=50 | grep -i "error\|exception" | grep -i "database\|postgres"; then
            echo "❌ Database connection errors found!"
            $COMPOSE_CMD logs klacks-api --tail=30
            exit 1
          else
            echo "✅ No database connection errors detected"
          fi

          # Check native library availability
          echo "🔍 Checking native library check..."
          if $COMPOSE_CMD logs klacks-api --tail=50 | grep -q "Native library check passed"; then
            echo "✅ Native libraries verified (LDAP)"
          elif $COMPOSE_CMD logs klacks-api --tail=50 | grep -q "FATAL: Required native libraries missing"; then
            echo "❌ Native libraries missing — LDAP authentication will not work!"
            $COMPOSE_CMD logs klacks-api --tail=30
            exit 1
          else
            echo "⚠️  Native library check not found in logs (still initializing?)"
          fi

          # Auth smoke test — verify login actually works
          echo "🔍 Auth smoke test..."
          sleep 10
          AUTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://klacks-api:5000/api/backend/account/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-test@invalid","password":"invalid"}' 2>/dev/null || echo "000")
          if [ "$AUTH_RESPONSE" = "401" ]; then
            echo "✅ Auth endpoint responding correctly (401 for invalid credentials)"
          elif [ "$AUTH_RESPONSE" = "000" ]; then
            echo "⚠️  Auth endpoint not reachable yet (API still starting)"
          else
            echo "⚠️  Auth endpoint returned unexpected status: $AUTH_RESPONSE"
          fi